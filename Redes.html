<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Redes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1>Gestión de Redes</h1>

  <h3>Esquema IP</h3>
  <p>Red: 192.168.1.0/24</p>
  <ul>
    <li>Gateway: 192.168.1.1</li>
    <li>PCs: 192.168.1.100 - 150</li>
    <li>Servidores: 192.168.1.10 - 20</li>
  </ul>

  <h3>Configuración básica router (Cisco)</h3>
  <pre>enable
configure terminal
interface g0/0
ip address 192.168.1.1 255.255.255.0
no shutdown</pre>

</div>
</body>
</html>
