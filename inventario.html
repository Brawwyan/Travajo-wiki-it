<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inventario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    function filtrar() {
      let input = document.getElementById("buscador").value.toLowerCase();
      let filas = document.querySelectorAll("tbody tr");
      filas.forEach(f => {
        f.style.display = f.innerText.toLowerCase().includes(input) ? "" : "none";
      });
    }
  </script>
</head>
<body>
<div class="container mt-5">
  <h1>Inventario del Aula</h1>

  <input type="text" id="buscador" onkeyup="filtrar()" class="form-control mb-3" placeholder="Buscar equipo...">

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Equipo</th>
        <th>Tipo</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>PC-01</td><td>Ordenador</td><td>Operativo</td></tr>
      <tr><td>SW-01</td><td>Switch</td><td>Operativo</td></tr>
      <tr><td>RT-01</td><td>Router</td><td>Mantenimiento</td></tr>
    </tbody>
  </table>

</div>
</body>
</html>
